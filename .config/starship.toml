# Starship prompt — Spider Web theme
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$docker_context\
$fill\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[>](bold #c41e3a)"
error_symbol = "[>](bold #ef4444)"

[directory]
style = "bold #2dd4bf"
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "bold #7b2d8b"
symbol = " "
format = "[$symbol$branch]($style) "

[git_status]
style = "bold #f59e0b"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "+"
behind = "-"
diverged = "~"
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
deleted = "x"

[nodejs]
style = "bold #22c55e"
symbol = " "
format = "[$symbol$version]($style) "
detect_files = ["package.json", ".node-version"]

[python]
style = "bold #f59e0b"
symbol = " "
format = "[$symbol$version( $virtualenv)]($style) "
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]

[rust]
style = "bold #c41e3a"
symbol = " "
format = "[$symbol$version]($style) "

[docker_context]
style = "bold #3b82f6"
symbol = " "
format = "[$symbol$context]($style) "
only_with_files = true

[cmd_duration]
style = "bold #555555"
min_time = 2_000
format = "[$duration]($style)"

[fill]
symbol = " "

[line_break]
disabled = false
