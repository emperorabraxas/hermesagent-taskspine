<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>spider.Web</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#c41e3a;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column}
.spinner{width:40px;height:40px;border:3px solid #1a1a1a;border-top:3px solid #c41e3a;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:0.8rem;color:#555}
.err{color:#c41e3a;margin-top:1rem;font-size:0.75rem;display:none}
</style>
</head><body>
<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">Connecting to spider.Web...</div>
<div class="err" id="err">spider.Web is not running. Start with: systemctl --user start spider-web</div>
<script>
const SERVER='http://localhost:8420';
async function connect(){
    for(let i=0;i<10;i++){
        try{
            const r=await fetch(SERVER+'/health');
            if(r.ok){window.location.href=SERVER;return}
        }catch(e){}
        document.getElementById('msg').textContent=`Connecting to spider.Web... (${i+1}/10)`;
        await new Promise(r=>setTimeout(r,1000));
    }
    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').textContent='Could not connect to spider.Web';
    document.getElementById('err').style.display='block';
}
connect();
</script>
</body></html>
