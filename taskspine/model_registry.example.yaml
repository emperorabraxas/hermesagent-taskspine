# Taskspine model registry (example)
#
# This maps your *local* low-tier model names (e.g. Ollama tags) to Hugging Face
# repo IDs so Taskspine can match them on a leaderboard dataset (preferred) and
# fall back to HF `model-index` if no leaderboard match exists.
#
# NOTE: "best model" is chosen from benchmark metrics only (no likes/downloads).
#
# Default leaderboard source (override via CLI args or env vars):
#   dataset: OpenEvals/leaderboard-data
#   coding metric: sweVerified_score
#   tool-use metric: terminalBench_score
#   chat metric: aggregate_score

low_tier_candidates:
  - name: "qwen2.5-coder:7b-instruct-q4_K_M"
    hf: "Qwen/Qwen2.5-Coder-7B-Instruct"
  - name: "llama3.1:8b-instruct-q4_K_M"
    hf: "meta-llama/Meta-Llama-3.1-8B-Instruct"
